<!DOCTYPE html>
<html>

<head>
    <title>Programmed Online Interview</title>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .header {
            background: white;
            padding: 24px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 0 8px #dddddd;
        }

        h1 {
            color: #87BC00;
            margin-top: 0;
        }

        .status {
            color: #555555;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">

        <h1>
            Programmed Online Interview
        </h1>

        <p>
            Welcome to Programmed. Your interview will begin in the chat window below.
        </p>

        <p class="status" id="workflowStatus">
            Preparing your interview...
        </p>

    </div>

</div>

<script>

const urlParams =
    new URLSearchParams(
        window.location.search
    );

const workflow =
    urlParams.get(
        "workflow"
    );

let initialUtterance = "";
let toolbarTitle = "Programmed Online Interview";

if (workflow === "JobQuery") {
    initialUtterance = "Job query";
    toolbarTitle =
        "Programmed - Job Application";
}
else if (workflow === "ShiftQuery") {
    initialUtterance = "Shift query";
    toolbarTitle =
        "Programmed - Shift Request";
}

document.getElementById(
    "workflowStatus"
).innerHTML =
    "<strong>Workflow:</strong> "
    + (workflow || "Not provided");

</script>

<script src="https://d2tmqmc8r1leha.cloudfront.net/lex-web-ui-loader.min.js"></script>

<script>

var loaderOpts = {
    baseUrl: "https://d2tmqmc8r1leha.cloudfront.net/",
    shouldLoadMinDeps: true
};

var loader =
    new ChatBotUiLoader.IframeLoader(
        loaderOpts
    );

var chatbotUiConfig = {
    lex: {
        initialUtterance: initialUtterance,
        sessionAttributes: {
            workflow: workflow || ""
        }
    },
    ui: {
        parentOrigin: "https://weezkid68-ui.github.io",
        toolbarTitle: toolbarTitle,
        toolbarLogo: "https://weezkid68-ui.github.io/ac-demo-prgmd/images/companylogo.jpg"
    }
};

loader.load(
    chatbotUiConfig
).catch(
    function (error) {
        console.error(error);
    }
);

</script>

</body>

</html>
