<!DOCTYPE html>
<html>

<head>

    <title>Programmed Online Interview</title>

    <style>

        body {
            font-family: Arial;
            background-color: #f5f5f5;
            margin: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 900px;
            margin: auto;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
        }

        #question {
            margin-top: 20px;
            font-size: 20px;
        }

        #status {
            color: #666;
            margin-top: 15px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1 id="title">
        Programmed Online Interview
    </h1>

    <div id="status">
    </div>

    <div id="question">
    </div>

    <input
        type="text"
        id="answer"
        placeholder="Type your answer here"
    >

    <button onclick="nextQuestion()">
        Next
    </button>

</div>

<script>

const urlParams =
    new URLSearchParams(
        window.location.search
    );

const workflow =
    urlParams.get(
        "workflow"
    );

let questions = [];

if (workflow === "JobQuery")
{
    document.getElementById(
        "title"
    ).innerText =
        "Job Application Interview";

    questions = [

        "Could you please tell me your first name?",

        "And what is your last name?",

        "What email address should we use to contact you about your application?",

        "What type of work are you looking for?"

    ];
}
else if (workflow === "ShiftQuery")
{
    document.getElementById(
        "title"
    ).innerText =
        "Shift Request Interview";

    questions = [

        "What date would you like to be considered for a shift?",

        "What is your preferred shift start time?",

        "Which client would you like to work for?",

        "Which department would you like to work in?"

    ];
}
else
{
    questions = [
        "Unknown workflow supplied."
    ];
}

let currentQuestion = 0;

const answers = {};

showQuestion();


function showQuestion()
{
    document.getElementById(
        "status"
    ).innerText =
        "Question "
        + (currentQuestion + 1)
        + " of "
        + questions.length;

    document.getElementById(
        "question"
    ).innerText =
        questions[currentQuestion];

    document.getElementById(
        "answer"
    ).value = "";
}


function nextQuestion()
{
    const answer =
        document.getElementById(
            "answer"
        ).value;

    answers[
        questions[currentQuestion]
    ] = answer;

    currentQuestion++;

    if (
        currentQuestion
        >=
        questions.length
    )
    {
        document.getElementById(
            "question"
        ).innerHTML =
            "<b>Interview Complete</b>";

        document.getElementById(
            "status"
        ).innerText =
            "";

        document.getElementById(
            "answer"
        ).style.display =
            "none";

        console.log(
            answers
        );

        return;
    }

    showQuestion();
}

</script>

</body>

</html>
