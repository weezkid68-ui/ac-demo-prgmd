<!DOCTYPE html>
<html>

<head>
    <title>Programmed Online Interview</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        h1 {
            color: #e74c3c;
        }

        .info-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="info-box">

        <h1>
            Programmed Online Interview
        </h1>

        <p>
            Welcome to Programmed.
            Please complete your interview using the chat window below.
        </p>

        <p id="workflowDisplay">
        </p>

    </div>

</div>

<script>

const urlParams =
    new URLSearchParams(
        window.location.search
    );

const workflow =
    urlParams.get(
        "workflow"
    );

document.getElementById(
    "workflowDisplay"
).innerHTML =
    "<strong>Workflow:</strong> "
    + (workflow || "Not provided");

</script>

<script src="https://d2tmqmc8r1leha.cloudfront.net/lex-web-ui-loader.min.js"></script>

<script>

var loaderOpts = {
    baseUrl: 'https://d2tmqmc8r1leha.cloudfront.net/',
    shouldLoadMinDeps: true
};

var loader =
    new ChatBotUiLoader.IframeLoader(
        loaderOpts
    );

var chatbotUiConfig = {};

loader.load(
    chatbotUiConfig
).catch(
    function (error) {
        console.error(error);
    }
);

</script>

</body>

</html>
