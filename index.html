<!DOCTYPE html>
<html>

<head>

    <title>Programmed Online Interview</title>

    <meta charset="UTF-8">

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
            padding-top: 100px;
        }

        .card {
            background: white;
            padding: 40px;
            max-width: 700px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px #cccccc;
        }

        h1 {
            color: #87BC00;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>
        Programmed Online Interview
    </h1>

    <p id="status">
        Preparing your interview...
    </p>

</div>

<script>

const urlParams =
    new URLSearchParams(
        window.location.search
    );

const workflow =
    urlParams.get(
        "workflow"
    );

document.getElementById(
    "status"
).innerHTML =
    "Workflow detected: "
    + (workflow || "Unknown")
    + "<br><br>"
    + "Redirecting to interview...";

const lexWebUiUrl =
    "https://d2tmqmc8r1leha.cloudfront.net/index.html";

if (workflow)
{
    window.location.href =
        lexWebUiUrl
        + "?workflow="
        + encodeURIComponent(workflow);
}
else
{
    document.getElementById(
        "status"
    ).innerHTML =
        "No workflow parameter supplied.";
}

</script>

</body>

</html>
